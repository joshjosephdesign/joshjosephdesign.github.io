<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patent Survey</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    #app {
      width: 100%;
      max-width: 680px;
    }

    #progress {
      font-size: 12px;
      color: #aaa;
      text-align: right;
      margin-bottom: 32px;
      letter-spacing: 0.04em;
    }

    #image-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }

    #patent-img {
      max-width: 100%;
      max-height: 480px;
      object-fit: contain;
      display: block;
    }

    #question {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    #answer {
      width: 100%;
      font-size: 16px;
      font-family: inherit;
      border: none;
      border-bottom: 1.5px solid #111;
      padding: 8px 0;
      outline: none;
      resize: none;
      min-height: 48px;
      background: transparent;
      color: #111;
    }

    #answer:focus {
      border-bottom-color: #333;
    }

    #submit-btn {
      margin-top: 28px;
      background: #111;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    #submit-btn:hover {
      background: #333;
    }

    #submit-btn:disabled {
      background: #ccc;
      cursor: default;
    }

    #next-wrap {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      margin-top: 28px;
    }

    #thanks {
      font-size: 15px;
      color: #555;
    }

    #next-btn {
      background: transparent;
      border: 1.5px solid #111;
      padding: 10px 28px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
    }

    #next-btn:hover {
      background: #f5f5f5;
    }

    #loading {
      color: #aaa;
      font-size: 15px;
      padding: 80px 0;
      text-align: center;
    }

    #error-msg {
      color: #c00;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    #clockin {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding-top: 80px;
    }

    #clockin-label {
      font-size: 22px;
      font-weight: 400;
    }

    #contributor-name {
      width: 100%;
      font-size: 16px;
      font-family: inherit;
      border: none;
      border-bottom: 1.5px solid #111;
      padding: 8px 0;
      outline: none;
      background: transparent;
      color: #111;
    }

    #contributor-name:focus {
      border-bottom-color: #333;
    }

    #clockin-btn {
      align-self: flex-start;
      background: #111;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    #clockin-btn:hover {
      background: #333;
    }

    #clockin-btn:disabled {
      background: #ccc;
      cursor: default;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="progress"></div>

    <div id="clockin">
      <div id="clockin-label">What's your name?</div>
      <input id="contributor-name" type="text" placeholder="Your name..." autocomplete="off" />
      <button id="clockin-btn" disabled>Clock In</button>
    </div>

    <div id="loading" style="display:none">Loading...</div>
    <div id="survey" style="display:none">
      <div id="image-wrap">
        <img id="patent-img" alt="Patent figure" />
      </div>
      <div id="question"></div>
      <textarea id="answer" placeholder="Your answer..." rows="2"></textarea>
      <div id="error-msg">Something went wrong. Please try again.</div>
      <button id="submit-btn">Submit</button>
      <div id="next-wrap">
        <div id="thanks">Thank you for your contribution.</div>
        <button id="next-btn">Try another →</button>
      </div>
    </div>
  </div>

    // ─────────────────────────────────────────────

    const QUESTIONS = [
      "How does this feel?",
      "Who is this?",
      "What are they doing?",
      "Why is this happening?",
      "What's going on?",
      "What are they?",
      "What does this feel like?",
      "What world is this from?",
      "What are you looking at?",
      "Describe the vibe.",
      "What’s their job?",
      "What genre is this?",
      "Give it an aura.",
      "What’s going on, medically?",
      "Who could this be?",
      "Describe the scenario, briefly."

    ];

    let answerCounts = {};
    let currentImage = null;
    let currentQuestion = null;
    let contributorName = "";

    // ── Clock-in logic ──
    const nameInput = document.getElementById("contributor-name");
    const clockinBtn = document.getElementById("clockin-btn");

    nameInput.addEventListener("input", () => {
      clockinBtn.disabled = nameInput.value.trim().length === 0;
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && nameInput.value.trim().length > 0) startSession();
    });

    clockinBtn.addEventListener("click", startSession);

    async function startSession() {
      contributorName = nameInput.value.trim();
      document.getElementById("clockin").style.display = "none";
      document.getElementById("loading").style.display = "block";
      await fetchCounts();
      showSurvey();
    }

    async function fetchCounts() {
      try {
        const res = await fetch(APPS_SCRIPT_URL + "?action=counts");
        const data = await res.json();
        answerCounts = data;
      } catch (e) {
        answerCounts = {};
      }
    }

    function pickImage() {
      if (IMAGES.length === 0) return null;
      // Split into unanswered vs answered
      const unanswered = IMAGES.filter(f => !answerCounts[f] || answerCounts[f] === 0);
      const pool = unanswered.length > 0 ? unanswered : IMAGES;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function pickQuestion() {
      return QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    }

    function updateProgress() {
      const answered = IMAGES.filter(f => answerCounts[f] && answerCounts[f] > 0).length;
      document.getElementById("progress").textContent =
        IMAGES.length > 0 ? `${answered} / ${IMAGES.length} queries completed` : "";
    }

    function showSurvey() {
      currentImage = pickImage();
      currentQuestion = pickQuestion();
      if (!currentImage) {
        document.getElementById("loading").textContent = "No images configured yet.";
        return;
      }
      const src = currentImage.startsWith("http") ? currentImage : IMAGE_BASE_URL + currentImage;
      document.getElementById("patent-img").src = src;
      document.getElementById("question").textContent = currentQuestion;
      document.getElementById("answer").value = "";
      document.getElementById("submit-btn").disabled = false;
      document.getElementById("next-wrap").style.display = "none";
      document.getElementById("error-msg").style.display = "none";
      document.getElementById("loading").style.display = "none";
      document.getElementById("survey").style.display = "block";
      updateProgress();
    }

    document.getElementById("submit-btn").addEventListener("click", async () => {
      const answer = document.getElementById("answer").value.trim();
      if (!answer) return;
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Submitting...";
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            image: currentImage,
            question: currentQuestion,
            answer: answer,
            contributor: contributorName,
            timestamp: new Date().toISOString()
          })
        });
        // Update local count
        answerCounts[currentImage] = (answerCounts[currentImage] || 0) + 1;
        btn.textContent = "Submit";
        document.getElementById("next-wrap").style.display = "flex";
        updateProgress();
      } catch (e) {
        document.getElementById("error-msg").style.display = "block";
        btn.disabled = false;
        btn.textContent = "Submit";
      }
    });

    document.getElementById("next-btn").addEventListener("click", () => {
      showSurvey();
    });

    // Init — waits for clock-in before loading
  </script>
